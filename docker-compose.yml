version: '3.8'

services:
  db:
    image: mongo:latest
    container_name: todo-db
    restart: always
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: todo-backend
    restart: always
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://db:27017/todoapp
      - NODE_ENV=development
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    container_name: todo-frontend
    restart: always
    ports:
      - '3000:3000'
    environment:
      - VITE_API_URL=http://backend:5000/api/todos
    depends_on:
      - backend

volumes:
  mongodb_data:
